<!DOCTYPE html>
<html>
<head>
    <title>Patients</title>
</head>
<body>
    <h1>Patients List</h1>

    <ul>
        {% for patient in patients %}
            <li>
                <a href="/patient/{{ patient.id }}">
                    {{ patient.name }} - Age: {{ patient.age }}
                </a>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
